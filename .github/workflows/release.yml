name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Syntax check
        run: |
          python -m py_compile clawbackup.py src/clawbackup/__init__.py src/clawbackup/cli.py scripts/render_homebrew_formula.py

      - name: Build distribution packages
        run: python -m build

      - name: Generate artifact checksums
        run: shasum -a 256 dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  sync-homebrew-tap:
    needs: build-and-release
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Huifu1018/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula into tap repo
        run: |
          ARCHIVE="$(ls dist/clawbackup-*.tar.gz | head -n1)"
          python scripts/render_homebrew_formula.py \
            "$ARCHIVE" \
            --github-repo Huifu1018/ClawBackup \
            --tag "${{ github.ref_name }}" \
            --output homebrew-tap/Formula/clawbackup.rb

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/clawbackup.rb
          if git diff --cached --quiet; then
            echo "No Homebrew formula changes to commit."
            exit 0
          fi
          git commit -m "Update clawbackup for ${{ github.ref_name }}"
          git push
